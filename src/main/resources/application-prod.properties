# =============================================
# PROD 프로파일 — 운영 전용
# 실행: --spring.profiles.active=prod
# =============================================

# SQL 로그 비활성화
spring.jpa.show-sql=false

# Security 로그 최소화
logging.level.org.springframework.security=WARN

# Swagger 비활성화 (운영 노출 방지)
springdoc.api-docs.enabled=false
