spring.application.name=capstone-backend

# 1. Database (Supabase) \uC124\uC815
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# 2. JPA/Hibernate \uC124\uC815 (\uC5D4\uD2F0\uD2F0 \uAE30\uBC18 DB \uD14C\uC774\uBE14 \uC790\uB3D9 \uAC80\uC99D)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# 3. Redis (Upstash) \uC124\uC815
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.ssl.enabled=true

# 4. AI \uC5D0\uC774\uC804\uD2B8 \uC11C\uBC84 \uC8FC\uC18C (FastAPI)
ai.agent.url=${AI_AGENT_URL}

# 5. Flyway \uD65C\uC131\uD654
spring.flyway.enabled=true

# API \uBB38\uC11C \uC790\uB3D9 \uC0DD\uC131 \uD65C\uC131\uD654(swagger)
springdoc.api-docs.enabled=true

# HikariCP \uCEE4\uB125\uC158 \uD480 \uAC1C\uC218\uB97C .env\uC758 \uAC12\uACFC \uB3D9\uAE30\uD654
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE} 
spring.datasource.hikari.minimum-idle=${DB_POOL_SIZE}
spring.datasource.hikari.pool-name=HikariPool-JPA-Isolated
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# Clerk \uC124\uC815
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${CLERK_JWKS_URL}
spring.security.oauth2.resourceserver.jwt.issuer-uri=${CLERK_ISSUER}
# Security 디버그 로그 (문제 파악 후 제거)
logging.level.org.springframework.security=DEBUG
